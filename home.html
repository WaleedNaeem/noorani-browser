<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <!-- NOORANI_DATA -->
  <script>
    (function () {
      const d = window.__NOORANI_DATA__;
      if (d && d.effectiveTheme) {
        document.documentElement.setAttribute('data-theme', d.effectiveTheme);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/typography.css">
  <title>New Tab</title>
  <style>
    :root[data-theme="light"] {
      --bg-primary:     #faf7f2;
      --bg-card:        #ffffff;
      --bg-card-hover:  #ffffff;
      --text-primary:   #2a2a2a;
      --text-secondary: #6b6b6b;
      --text-tertiary:  #9a9a9a;
      --accent:         #c9a961;
      --accent-ink:     #8a6f2b;
      --shimmer-bright: #f0d98a;
      --border:         #e8e2d5;
      --border-strong:  #d6ccb2;
      --shadow:         0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover:   0 10px 28px rgba(138, 111, 43, 0.14);
    }
    :root[data-theme="dark"] {
      --bg-primary:     #1a1a1a;
      --bg-card:        #252525;
      --bg-card-hover:  #252525;
      --text-primary:   #e8e8e8;
      --text-secondary: #9a9a9a;
      --text-tertiary:  #6b6b6b;
      --accent:         #d4af37;
      --accent-ink:     #d4af37;
      --shimmer-bright: #f5d97a;
      --border:         #3a3a3a;
      --border-strong:  #4a4a4a;
      --shadow:         0 1px 3px rgba(0,0,0,0.3);
      --shadow-hover:   0 10px 28px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    body {
      display: flex; flex-direction: column;
    }

    /* -------- Top bar -------- */
    .topbar {
      flex: 0 0 auto;
      display: flex; align-items: center;
      padding: 20px 28px;
    }
    /* Static wordmark. A background-clip: text shimmer was tried and
       removed because sweeping the gradient past the text edges made
       the left letters render transparent ("rani" bug) on some
       Chromium versions. Correct-and-still beats broken-and-animated. */
    .wordmark {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: var(--text-lg);
      color: var(--accent-ink);
      letter-spacing: 0.01em;
      user-select: none;
      background: none;
    }
    .topbar__spacer { flex: 1 1 auto; }
    .pill--placeholder {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      line-height: 1.4;
    }

    /* ---- Phase 9 Batch 1: Prayer + Hijri + Qibla ---- */
    .prayer-section {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }
    .prayer-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 14px;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }
    .prayer-meta__sep { opacity: 0.5; }
    .prayer-meta strong {
      color: var(--text-secondary);
      font-weight: 500;
    }
    .prayer-cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    @media (max-width: 640px) {
      .prayer-cards { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 420px) {
      .prayer-cards { grid-template-columns: repeat(2, 1fr); }
    }
    .prayer-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px 12px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 150ms ease-out, box-shadow 150ms ease-out;
    }
    .prayer-card--next {
      background: linear-gradient(180deg,
        rgba(201, 169, 97, 0.14) 0%,
        rgba(201, 169, 97, 0.06) 100%);
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    :root[data-theme="dark"] .prayer-card--next {
      background: linear-gradient(180deg,
        rgba(212, 175, 55, 0.18) 0%,
        rgba(212, 175, 55, 0.08) 100%);
    }
    .prayer-card__name {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      margin: 0 0 6px;
    }
    .prayer-card--next .prayer-card__name { color: var(--accent-ink); }
    .prayer-card__time {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 400;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .prayer-card__state {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 6px;
      min-height: 14px;
    }
    .prayer-card--passed .prayer-card__time { color: var(--text-tertiary); }
    .prayer-card--next .prayer-card__state {
      color: var(--accent-ink);
      font-weight: 600;
    }

    /* Qibla card */
    .qibla-card {
      margin-top: 18px;
      display: flex; align-items: center; gap: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
    }
    .qibla-card__compass {
      position: relative;
      width: 48px; height: 48px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 48px;
    }
    .qibla-card__arrow {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 22px solid var(--accent-ink);
      transform-origin: center 15px;
      transition: transform 300ms ease;
    }
    .qibla-card__label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .qibla-card__value {
      font-family: var(--font-serif);
      font-size: 22px;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .qibla-card__hint {
      color: var(--text-tertiary);
      font-size: 11px;
      margin-top: 4px;
    }

    /* -------- Hero -------- */
    /* Content fills the space between the topbar and the footer and
       centres itself vertically. The footer is pinned to the viewport
       bottom via margin-top: auto below. */
    .hero {
      flex: 1 1 auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 32px 28px;
      gap: 56px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .greeting {
      font-family: var(--font-serif);
      font-size: var(--text-3xl);
      font-weight: 400;
      line-height: var(--leading-tight);
      margin: 0;
      color: var(--text-primary);
      max-width: 720px;
      background: transparent;
      opacity: 0;
      transform: translateY(-8px);
      animation: home-fade-in 400ms ease-out 50ms 1 both;
    }
    .greeting em {
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--accent-ink);
      background: transparent;
    }
    @keyframes home-fade-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* -------- Shortcuts -------- */
    .shortcuts {
      width: 100%;
    }
    .shortcuts__label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      background: transparent;
      margin: 0 0 14px 6px;
      text-align: left;
    }
    .shortcuts__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 700px) {
      .shortcuts__grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .greeting { font-size: var(--text-2xl); }
      .hero    { padding: 24px 20px; gap: 40px; }
    }

    .shortcut {
      display: flex; align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-primary);
      cursor: pointer;
      box-shadow: var(--shadow);
      min-width: 0;
      opacity: 0;
      transform: translateY(-4px);
      transition: transform 150ms ease-out, box-shadow 150ms ease-out;
    }
    /* Per-tile stagger — each tile fades in 50ms after the previous.
       Last tile finishes at 50ms delay + 250ms stagger + 400ms duration = 700ms. */
    .shortcut { animation: home-tile-in 400ms ease-out 1 both; }
    .shortcut:nth-child(1) { animation-delay: 100ms; }
    .shortcut:nth-child(2) { animation-delay: 150ms; }
    .shortcut:nth-child(3) { animation-delay: 200ms; }
    .shortcut:nth-child(4) { animation-delay: 250ms; }
    .shortcut:nth-child(5) { animation-delay: 300ms; }
    .shortcut:nth-child(6) { animation-delay: 350ms; }
    @keyframes home-tile-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Hover: lift only — no colour shift. */
    .shortcut:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    .shortcut__fav {
      flex: 0 0 24px;
      width: 24px; height: 24px;
      border-radius: 6px;
      object-fit: contain;
      background: var(--bg-primary);
    }
    .shortcut__name {
      flex: 1 1 auto;
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    /* -------- Footer -------- */
    /* margin-top: auto is belt-and-braces with the hero's flex:1 — it
       still anchors to the viewport bottom if the hero's flex ever
       changes. 24px bottom padding keeps it off the window edge. */
    .footer {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      gap: 14px;
      margin-top: auto;
      padding: 0 28px 24px;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      background: transparent;
    }
    .footer a {
      color: var(--text-tertiary);
      text-decoration: none;
      border-bottom: 1px dotted var(--text-tertiary);
      transition: color 140ms ease, border-color 140ms ease;
    }
    .footer a:hover {
      color: var(--accent-ink);
      border-bottom-color: var(--accent-ink);
    }
    .footer__sep { opacity: 0.5; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wordmark">Noorani</div>
    <div class="topbar__spacer"></div>
  </header>

  <main class="hero">
    <h1 class="greeting" id="greeting">&nbsp;</h1>

    <section class="prayer-section" id="prayer-section" hidden>
      <div class="prayer-meta" id="prayer-meta"></div>
      <div class="prayer-cards" id="prayer-cards"></div>
      <div class="qibla-card" id="qibla-card" hidden>
        <div class="qibla-card__compass">
          <div class="qibla-card__arrow" id="qibla-arrow"></div>
        </div>
        <div>
          <div class="qibla-card__label">Qibla</div>
          <div class="qibla-card__value" id="qibla-value">—</div>
          <div class="qibla-card__hint" id="qibla-hint">Direction to the Kaaba</div>
        </div>
      </div>
    </section>

    <section class="shortcuts">
      <div class="shortcuts__label">Shortcuts</div>
      <div class="shortcuts__grid" id="shortcuts-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <span id="version-tag">Noorani Browser</span>
    <span class="footer__sep">·</span>
    <a href="noorani://settings">Settings</a>
  </footer>

  <script>
    (function () {
      const DATA = window.__NOORANI_DATA__ || {};
      const api  = window.nooraniAPI;
      const settings = DATA.settings || {};

      // Stay in sync with theme changes while on the home page.
      if (api && api.settings && api.settings.onChange) {
        api.settings.onChange((next) => {
          const t = next._effectiveTheme || next.theme;
          document.documentElement.setAttribute(
            'data-theme', t === 'dark' ? 'dark' : 'light'
          );
        });
      }

      // ---------- Time-aware greeting ----------
      // PLACEHOLDER thresholds for Phase 7. Phase 9 will replace these
      // with real prayer-time boundaries. Deliberately no judgmental
      // copy for late-night users — the 8pm–4am band stays warm and
      // neutral.
      function greetingText() {
        const h = new Date().getHours();
        const alaikum = '<em>alaikum</em>';
        if (h >= 4  && h < 12) return `As-salamu ${alaikum}. Good morning.`;
        if (h >= 12 && h < 17) return `As-salamu ${alaikum}. Good afternoon.`;
        if (h >= 17 && h < 20) return `As-salamu ${alaikum}. Good evening.`;
        return `As-salamu ${alaikum}.`;
      }
      document.getElementById('greeting').innerHTML = greetingText();

      // ---------- Shortcuts ----------
      const DEFAULT_SHORTCUTS = [
        { url: 'https://quran.com',         title: 'Quran.com' },
        { url: 'https://www.aljazeera.com', title: 'Al Jazeera' },
        { url: 'https://www.bbc.com',       title: 'BBC' },
        { url: 'https://github.com',        title: 'GitHub' },
        { url: 'https://mail.google.com',   title: 'Gmail' },
        { url: 'https://www.youtube.com',   title: 'YouTube' }
      ];
      const FALLBACK_FAVICON =
        'data:image/svg+xml;utf8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
          'fill="none" stroke="#9a9a9a" stroke-width="2" ' +
          'stroke-linecap="round" stroke-linejoin="round">' +
          '<circle cx="12" cy="12" r="10"/>' +
          '<line x1="2" y1="12" x2="22" y2="12"/>' +
          '<path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/>' +
          '</svg>'
        );
      function hostOf(url) {
        try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
      }
      function googleFavicon(url) {
        const h = hostOf(url);
        return h
          ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(h)}&sz=64`
          : FALLBACK_FAVICON;
      }

      const grid = document.getElementById('shortcuts-grid');
      const topSites = Array.isArray(DATA.topSites) ? DATA.topSites : [];
      const list = topSites.length >= 6 ? topSites.slice(0, 6) : DEFAULT_SHORTCUTS;

      for (const s of list) {
        const a = document.createElement('a');
        a.className = 'shortcut';
        a.href = s.url;
        const img = document.createElement('img');
        img.className = 'shortcut__fav';
        img.src = s.favicon || googleFavicon(s.url);
        img.alt = '';
        img.onerror = () => { img.onerror = null; img.src = FALLBACK_FAVICON; };
        const name = document.createElement('span');
        name.className = 'shortcut__name';
        name.textContent = s.title || hostOf(s.url) || s.url;
        a.append(img, name);
        grid.appendChild(a);
      }

      // ---------- Footer version ----------
      if (api && api.app && api.app.getVersions) {
        api.app.getVersions().then((v) => {
          const tag = document.getElementById('version-tag');
          if (v && v.app) tag.textContent = `Noorani Browser v${v.app}`;
        }).catch(() => {});
      }

      // ---------- Phase 9 Batch 1: prayer / hijri / qibla ----------
      const prayerSection = document.getElementById('prayer-section');
      const prayerMeta    = document.getElementById('prayer-meta');
      const prayerCards   = document.getElementById('prayer-cards');
      const qiblaCard     = document.getElementById('qibla-card');
      const qiblaValue    = document.getElementById('qibla-value');
      const qiblaArrow    = document.getElementById('qibla-arrow');

      const PRAYER_ORDER = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
      const pretty = (s) => s.charAt(0).toUpperCase() + s.slice(1);
      function clockOf(d) {
        if (!d) return '—';
        const x = (d instanceof Date) ? d : new Date(d);
        return x.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }
      function countdownLabel(mins) {
        if (!Number.isFinite(mins) || mins < 0) mins = 0;
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        return h > 0 ? `in ${h}h ${m}m` : `in ${m}m`;
      }

      function getFlags() {
        const s = (settings && settings.features) || {};
        return (s.worship) || {};
      }

      async function renderPrayerUI() {
        const s  = await (api && api.settings && api.settings.get());
        const w  = (s && s.features && s.features.worship) || {};
        const showPrayer = !!w.prayerTimes;
        const showHijri  = !!w.hijriCalendar;
        const showQibla  = !!w.qibla;

        if (!showPrayer && !showQibla) {
          prayerSection.hidden = true;
          return;
        }
        prayerSection.hidden = false;

        // ----- Times -----
        if (showPrayer) {
          prayerCards.style.display = '';
          const snap = await (api && api.prayer && api.prayer.getTimes());
          if (!snap || !snap.times) {
            prayerCards.innerHTML =
              '<div style="grid-column: 1 / -1; padding: 16px; ' +
              'text-align: center; color: var(--text-tertiary); ' +
              'font-size: 12px;">Prayer location not set. ' +
              '<a href="noorani://settings" style="color: var(--accent-ink);">Update it in Settings.</a>' +
              '</div>';
            prayerMeta.innerHTML = '';
          } else {
            renderCards(snap);
            renderMeta(snap, s, showHijri);
          }
        } else {
          prayerCards.style.display = 'none';
          prayerMeta.innerHTML = '';
        }

        // ----- Qibla -----
        if (showQibla) {
          const q = await (api && api.qibla && api.qibla.get());
          if (q && Number.isFinite(q.bearing)) {
            qiblaCard.hidden = false;
            qiblaValue.textContent = `${q.bearing}° ${q.compass}`;
            qiblaArrow.style.transform = `rotate(${q.bearing}deg)`;
          } else {
            qiblaCard.hidden = true;
          }
        } else {
          qiblaCard.hidden = true;
        }
      }

      function renderCards(snap) {
        const t = snap.times;
        const now = Date.now();
        const next = snap.next;
        const nextName = next ? next.prayerName : null;
        const parts = [];
        for (const name of PRAYER_ORDER) {
          const when = t[name] ? new Date(t[name]) : null;
          const passed = when && when.getTime() < now;
          const isNext = (name === nextName);
          let state = 'upcoming';
          let stateText = 'upcoming';
          if (passed) { state = 'passed'; stateText = 'passed'; }
          if (isNext) {
            state = 'next';
            const mins = when
              ? Math.max(0, Math.round((when.getTime() - now) / 60000))
              : next.minutesUntil;
            stateText = countdownLabel(mins);
          }
          parts.push(
            `<div class="prayer-card prayer-card--${state}">` +
              `<div class="prayer-card__name">${pretty(name)}</div>` +
              `<div class="prayer-card__time">${clockOf(when)}</div>` +
              `<div class="prayer-card__state">${stateText}</div>` +
            `</div>`
          );
        }
        prayerCards.innerHTML = parts.join('');
      }

      async function renderMeta(snap, s, showHijri) {
        const bits = [];
        if (showHijri && api && api.hijri) {
          try {
            const h = await api.hijri.get();
            if (h && h.day) bits.push(`<strong>${h.day} ${h.monthName} ${h.year}</strong>`);
          } catch (_) {}
        }
        const loc = (s && s.location) || {};
        if (loc.city) bits.push(loc.city);
        if (snap && snap.times) {
          bits.push(`Sunrise ${clockOf(snap.times.sunrise)}`);
          bits.push(`Maghrib ${clockOf(snap.times.maghrib)}`);
        }
        prayerMeta.innerHTML = bits.length
          ? bits.join(' <span class="prayer-meta__sep">·</span> ')
          : '';
      }

      // Initial render + refresh every minute + react to main-process updates.
      renderPrayerUI();
      setInterval(() => renderPrayerUI().catch(() => {}), 60 * 1000);

      if (api && api.prayer && api.prayer.onUpdate) {
        api.prayer.onUpdate(() => renderPrayerUI().catch(() => {}));
      }
      if (api && api.settings && api.settings.onChange) {
        api.settings.onChange((next) => {
          Object.assign(settings, next);
          renderPrayerUI().catch(() => {});
        });
      }
    })();
  </script>
</body>
</html>
