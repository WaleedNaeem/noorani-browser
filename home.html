<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <!-- NOORANI_DATA -->
  <script>
    // Apply theme from injected data before first paint.
    (function () {
      const d = window.__NOORANI_DATA__;
      if (d && d.effectiveTheme) {
        document.documentElement.setAttribute('data-theme', d.effectiveTheme);
      }
    })();
  </script>
  <title>New Tab</title>
  <style>
    :root[data-theme="light"] {
      --page-bg:    #faf7f2;
      --text:       #2a2a2a;
      --muted:      #6b6b6b;
      --accent:     #c9a961;
      --accent-ink: #8a6f2b;
      --card-bg:    #ffffff;
      --card-br:    #e8e2d5;
      --hover:      #efe6cf;
    }
    :root[data-theme="dark"] {
      --page-bg:    #1a1a1a;
      --text:       #e8e8e8;
      --muted:      #9a9a9a;
      --accent:     #d4af37;
      --accent-ink: #d4af37;
      --card-bg:    #252525;
      --card-br:    #3a3a3a;
      --hover:      #2d2d2d;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--page-bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 12vh 24px 48px;
    }

    .wordmark {
      font-size: 30px; letter-spacing: 0.5px;
      margin-bottom: 44px; color: var(--text);
    }
    .wordmark .noorani {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic; color: var(--accent-ink);
    }

    .search { width: 560px; max-width: min(90vw, 720px); }
    .search input {
      width: 100%; height: 52px;
      padding: 0 22px; font-size: 16px;
      color: var(--text);
      background: var(--card-bg);
      border: 1px solid var(--card-br); border-radius: 30px;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .search input::placeholder { color: var(--muted); }
    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.22);
    }

    .shortcuts {
      margin-top: 48px;
      display: grid;
      grid-template-columns: repeat(3, 104px);
      gap: 12px;
    }
    @media (min-width: 720px) {
      .shortcuts { grid-template-columns: repeat(6, 104px); }
    }

    .shortcut {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 8px;
      text-decoration: none; color: inherit;
      border-radius: 12px;
      transition: background-color 120ms ease, transform 120ms ease;
    }
    .shortcut:hover {
      background: var(--hover);
      transform: translateY(-1px);
    }
    .shortcut img {
      width: 32px; height: 32px; object-fit: contain;
      margin-bottom: 10px; border-radius: 6px;
      background: var(--card-bg); padding: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .shortcut span {
      font-size: 12px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      max-width: 96px; color: var(--text);
    }

    .empty {
      margin-top: 48px; color: var(--muted);
      font-size: 13px; max-width: 440px;
      text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wordmark">
      <span class="noorani">Noorani</span>&nbsp;<span class="browser">Browser</span>
    </div>

    <form class="search" autocomplete="off" id="search-form">
      <input name="q" type="text" placeholder="Search with Noorani" autofocus />
    </form>

    <div id="shortcuts" class="shortcuts" hidden></div>
    <div id="empty" class="empty" hidden>
      Your shortcuts will appear here as you browse.
    </div>
  </div>

  <script>
    (function () {
      const data = window.__NOORANI_DATA__ || {};

      // --- Search form wiring ----------------------------------------------
      const engines  = data.engines || {};
      const engineKey = (data.settings && data.settings.searchEngine) || 'google';
      const engine   = engines[engineKey] || engines.google ||
                       { search: 'https://www.google.com/search?q=' };

      const form  = document.getElementById('search-form');
      const input = form.querySelector('input[name="q"]');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const q = input.value.trim();
        if (!q) return;
        window.location.href = engine.search + encodeURIComponent(q);
      });

      // --- Live theme updates ---------------------------------------------
      if (window.nooraniAPI && window.nooraniAPI.settings) {
        window.nooraniAPI.settings.onChange((next) => {
          const t = next._effectiveTheme || next.theme;
          document.documentElement.setAttribute(
            'data-theme', t === 'dark' ? 'dark' : 'light'
          );
        });
      }

      // --- Shortcuts ------------------------------------------------------
      const top       = data.topSites || [];
      const container = document.getElementById('shortcuts');
      const empty     = document.getElementById('empty');

      if (!top.length) {
        empty.hidden = false;
        return;
      }
      container.hidden = false;

      function hostLabel(url) {
        try { return new URL(url).hostname.replace(/^www\./, ''); }
        catch (_) { return url; }
      }

      const fallback = 'data:image/svg+xml;utf8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
        'fill="none" stroke="#8a7f62" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round">' +
        '<circle cx="12" cy="12" r="10"/>' +
        '<line x1="2" y1="12" x2="22" y2="12"/>' +
        '<path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/>' +
        '</svg>'
      );

      for (const site of top) {
        const a = document.createElement('a');
        a.href = site.url;
        a.className = 'shortcut';
        const img = document.createElement('img');
        img.src = site.favicon || fallback;
        img.alt = '';
        img.onerror = function () {
          this.onerror = null; this.src = fallback;
        };
        const label = document.createElement('span');
        label.textContent = site.title || hostLabel(site.url);
        a.append(img, label);
        container.appendChild(a);
      }
    })();
  </script>
</body>
</html>
