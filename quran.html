<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <!-- NOORANI_DATA -->
  <script>
    (function () {
      const d = window.__NOORANI_DATA__;
      if (d && d.effectiveTheme) {
        document.documentElement.setAttribute('data-theme', d.effectiveTheme);
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/typography.css">
  <title>Quran · Noorani</title>
  <style>
    @font-face {
      font-family: 'Amiri Quran';
      font-style: normal;
      font-weight: 400;
      src: url('/assets/fonts/AmiriQuran-Regular.ttf') format('truetype');
      font-display: swap;
    }

    :root[data-theme="light"] {
      --bg-primary:     #faf7f2;
      --bg-card:        #ffffff;
      --bg-hover:       #f5efe2;
      --text-primary:   #2a2a2a;
      --text-secondary: #6b6b6b;
      --text-tertiary:  #9a9a9a;
      --arabic-ink:     #1a1a1a;
      --accent:         #c9a961;
      --accent-ink:     #8a6f2b;
      --accent-wash:    #f4ead2;
      --border:         #e8e2d5;
      --border-strong:  #d6ccb2;
      --shadow:         0 1px 3px rgba(0,0,0,0.05);
      --shadow-lift:    0 6px 22px rgba(138, 111, 43, 0.10);
    }
    :root[data-theme="dark"] {
      --bg-primary:     #1a1a1a;
      --bg-card:        #252525;
      --bg-hover:       #2e2a22;
      --text-primary:   #e8e8e8;
      --text-secondary: #9a9a9a;
      --text-tertiary:  #6b6b6b;
      --arabic-ink:     #f4f1ea;       /* warm off-white — easier on eyes */
      --accent:         #d4af37;
      --accent-ink:     #d4af37;
      --accent-wash:    #33291a;
      --border:         #3a3a3a;
      --border-strong:  #4a4a4a;
      --shadow:         0 1px 3px rgba(0,0,0,0.35);
      --shadow-lift:    0 6px 22px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
    }

    /* ——— Header ——— */
    .qr-header {
      position: sticky; top: 0;
      display: flex; align-items: center; gap: 14px;
      padding: 10px 18px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      flex-wrap: wrap;
    }
    .qr-brand {
      font-family: var(--font-serif, Georgia, serif);
      font-style: italic;
      font-size: 16px;
      color: var(--accent-ink);
    }
    .qr-nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 6px 10px; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      transition: background .15s, border-color .15s;
    }
    .qr-nav-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
    .qr-nav-btn:disabled { opacity: .4; cursor: default; }

    select.qr-select, input.qr-input {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
    }
    select.qr-select:focus, input.qr-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-wash);
    }
    .qr-jump { width: 90px; text-align: center; }
    .qr-search { flex: 1 1 240px; min-width: 180px; }

    .qr-sidebar-toggle {
      display: inline-flex; align-items: center; gap: 6px;
    }

    /* ——— Layout ——— */
    .qr-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 54px);
    }
    .qr-layout[data-sidebar="hidden"] { grid-template-columns: 0 1fr; }
    .qr-layout[data-sidebar="hidden"] .qr-sidebar { display: none; }

    /* ——— Sidebar ——— */
    .qr-sidebar {
      border-right: 1px solid var(--border);
      padding: 10px 0;
      max-height: calc(100vh - 54px);
      overflow-y: auto;
      background: var(--bg-primary);
    }
    .qr-sidebar-item {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: background .12s, color .12s;
    }
    .qr-sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .qr-sidebar-item[data-active="true"] {
      background: var(--accent-wash);
      color: var(--text-primary);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .qr-sidebar-num { color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
    .qr-sidebar-name-en { font-weight: 500; }
    .qr-sidebar-name-ar {
      font-family: 'Amiri Quran', 'Traditional Arabic', 'Noto Naskh Arabic', serif;
      direction: rtl;
      color: var(--text-primary);
      font-size: 15px;
    }

    /* ——— Reader ——— */
    .qr-reader {
      padding: 40px 28px 120px;
      overflow-y: auto;
      max-height: calc(100vh - 54px);
    }
    .qr-reader-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    .qr-surah-head {
      text-align: center;
      padding: 28px 20px 34px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .qr-surah-head .qr-surah-arabic {
      font-family: 'Amiri Quran', 'Traditional Arabic', serif;
      font-size: 56px;
      color: var(--arabic-ink);
      line-height: 1.2;
      direction: rtl;
      margin-bottom: 8px;
    }
    .qr-surah-head .qr-surah-translit {
      font-family: var(--font-serif, Georgia, serif);
      font-size: 22px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .qr-surah-head .qr-surah-meaning {
      font-style: italic;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 10px;
    }
    .qr-surah-head .qr-surah-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .qr-surah-head .qr-badge {
      display: inline-block;
      background: var(--accent-wash);
      color: var(--accent-ink);
      padding: 2px 8px; border-radius: 100px;
      margin-right: 4px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .qr-bismillah {
      font-family: 'Amiri Quran', 'Traditional Arabic', serif;
      font-size: 36px;
      color: var(--arabic-ink);
      text-align: center;
      direction: rtl;
      margin: 28px 0 40px;
      line-height: 1.6;
    }

    .qr-verse {
      padding: 18px 16px;
      border-radius: 10px;
      transition: background .15s;
      margin-bottom: 6px;
      position: relative;
    }
    .qr-verse:hover {
      background: var(--accent-wash);
    }
    .qr-verse-arabic-row {
      display: flex;
      direction: rtl;
      gap: 16px;
      align-items: flex-start;
    }
    .qr-verse-badge {
      flex: 0 0 auto;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      display: inline-flex;
      align-items: center; justify-content: center;
      font-family: 'Amiri Quran', serif;
      font-size: 15px;
      color: var(--accent-ink);
      margin-top: 4px;
    }
    .qr-verse-arabic {
      flex: 1 1 auto;
      font-family: 'Amiri Quran', 'Traditional Arabic', 'Noto Naskh Arabic', serif;
      font-size: 32px;
      line-height: 2.0;
      letter-spacing: 0;
      color: var(--arabic-ink);
      direction: rtl;
      text-align: right;
    }
    .qr-verse-translation {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
      padding: 10px 54px 0 2px;  /* align under the Arabic after the badge */
      direction: ltr;
      text-align: left;
    }
    .qr-verse-ref {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      margin-top: 6px;
      padding: 0 54px 0 2px;
    }
    .qr-verse-actions {
      display: none;
      gap: 4px;
      margin-top: 10px;
      padding: 0 54px 0 2px;
    }
    .qr-verse:hover .qr-verse-actions,
    .qr-verse:focus-within .qr-verse-actions {
      display: flex;
    }
    .qr-verse-action {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .qr-verse-action:hover {
      background: var(--bg-card);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    .qr-verse-action.qr-bookmarked {
      background: var(--accent-wash);
      color: var(--accent-ink);
      border-color: var(--accent);
    }
    .qr-verse-action:disabled {
      opacity: .5; cursor: not-allowed;
    }

    /* Footer navigation */
    .qr-footer-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .qr-footer-nav button {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      transition: border-color .15s, background .15s;
    }
    .qr-footer-nav button:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--bg-hover);
    }
    .qr-footer-nav button:disabled { opacity: .4; cursor: default; }

    /* Search results */
    .qr-search-results {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
      max-height: 50vh;
      overflow-y: auto;
    }
    .qr-search-results[data-open="true"] { display: block; }
    .qr-search-count {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .qr-search-hit {
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .12s;
    }
    .qr-search-hit:hover { background: var(--bg-hover); }
    .qr-search-hit .hit-ref {
      font-size: 11px;
      color: var(--accent-ink);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .qr-search-hit .hit-text {
      font-size: 13px;
      color: var(--text-primary);
      margin-top: 2px;
      line-height: 1.5;
    }
    .qr-search-hit mark {
      background: var(--accent-wash);
      color: var(--accent-ink);
      padding: 0 2px;
      border-radius: 2px;
    }

    .qr-toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 18px;
      border-radius: 100px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 100;
    }
    .qr-toast[data-show="true"] { opacity: 0.95; }

    .qr-hidden-translation .qr-verse-translation,
    .qr-hidden-translation .qr-verse-ref { display: none; }

    @media (max-width: 820px) {
      .qr-layout { grid-template-columns: 1fr; }
      .qr-sidebar { display: none; }
      .qr-header { padding: 10px 12px; gap: 8px; }
      .qr-search { flex-basis: 100%; order: 10; }
    }
  </style>
</head>
<body>
  <header class="qr-header">
    <span class="qr-brand">Noorani · Quran</span>
    <button class="qr-nav-btn" id="qr-toggle-sidebar" title="Toggle surah list">☰</button>
    <select class="qr-select" id="qr-surah-picker" aria-label="Select surah"></select>
    <input class="qr-input qr-jump" id="qr-jump" placeholder="2:255" aria-label="Jump to verse">
    <select class="qr-select" id="qr-translation" aria-label="Translation">
      <option value="sahih">Sahih International</option>
      <option value="pickthall">Pickthall</option>
      <option value="none">Hide Translation</option>
    </select>
    <input class="qr-input qr-search" id="qr-search" placeholder="Search verses..." aria-label="Search verses">
  </header>

  <div class="qr-layout" id="qr-layout">
    <aside class="qr-sidebar" id="qr-sidebar"></aside>
    <main class="qr-reader" id="qr-reader">
      <div class="qr-reader-inner" id="qr-reader-inner">
        <div style="text-align:center; color: var(--text-secondary); padding: 80px 0;">Loading Quran...</div>
      </div>
    </main>
  </div>

  <div class="qr-toast" id="qr-toast"></div>

  <script>
    // ========================================================================
    // Quran reader — driven entirely by nooraniAPI.quran.* IPC methods.
    // No verse text is held in the page except what's currently rendered.
    // ========================================================================

    const api = window.nooraniAPI;
    if (!api || !api.quran) {
      document.getElementById('qr-reader-inner').textContent =
        'Quran API not available. Reload the tab.';
      throw new Error('nooraniAPI.quran missing');
    }

    const state = {
      surahs:       [],
      currentSurah: 1,
      currentVerse: null,     // null = render whole surah, number = scroll to ayah
      translation:  'sahih',  // 'sahih' | 'pickthall' | 'none'
      translationByLang: {},  // cache: { sahih: { [surahNum]: verses[] }, pickthall: {...} }
      surahCache:   {},       // { [surahNum]: {meta, verses[{n, arabic}]} }
      duaSet:       new Set() // "S:V" references already bookmarked
    };

    // Persisted translation preference.
    try {
      const d = window.__NOORANI_DATA__;
      const pref = d && d.settings && d.settings.features &&
                   d.settings.features.worship &&
                   d.settings.features.worship.quranTranslation;
      if (pref === 'sahih' || pref === 'pickthall' || pref === 'none') {
        state.translation = pref;
      }
    } catch (_) {}

    function showToast(msg, ms) {
      const t = document.getElementById('qr-toast');
      t.textContent = msg;
      t.setAttribute('data-show', 'true');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.setAttribute('data-show', 'false'), ms || 1800);
    }

    async function loadDuaSet() {
      try {
        const list = await api.duas.list();
        state.duaSet = new Set(
          (list || []).filter((d) => d.type === 'ayah' && d.reference).map((d) => d.reference)
        );
      } catch (_) { state.duaSet = new Set(); }
    }

    async function getSurah(num) {
      if (state.surahCache[num]) return state.surahCache[num];
      const s = await api.quran.getSurah(num);
      if (s) state.surahCache[num] = s;
      return s;
    }

    async function getTranslationForSurah(lang, num) {
      if (lang === 'none') return null;
      if (!state.translationByLang[lang]) state.translationByLang[lang] = {};
      if (state.translationByLang[lang][num]) return state.translationByLang[lang][num];
      const t = await api.quran.getTranslation(lang, num);
      if (t) state.translationByLang[lang][num] = t;
      return t;
    }

    function populateSurahPicker() {
      const sel = document.getElementById('qr-surah-picker');
      sel.innerHTML = '';
      for (const s of state.surahs) {
        const opt = document.createElement('option');
        opt.value = String(s.number);
        opt.textContent = `${s.number}. ${s.transliteration} · ${s.arabic}`;
        sel.appendChild(opt);
      }
      sel.value = String(state.currentSurah);
    }

    function renderSidebar() {
      const side = document.getElementById('qr-sidebar');
      side.innerHTML = '';
      for (const s of state.surahs) {
        const it = document.createElement('div');
        it.className = 'qr-sidebar-item';
        it.setAttribute('role', 'button');
        it.tabIndex = 0;
        if (s.number === state.currentSurah) it.setAttribute('data-active', 'true');
        it.innerHTML =
          `<span class="qr-sidebar-num">${s.number}</span>` +
          `<span class="qr-sidebar-name-en">${escapeHtml(s.transliteration)}</span>` +
          `<span class="qr-sidebar-name-ar">${escapeHtml(s.arabic)}</span>`;
        it.addEventListener('click', () => navigateTo(s.number, null));
        it.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigateTo(s.number, null); }
        });
        side.appendChild(it);
      }
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function renderSurah(num, scrollToVerse) {
      const surah = await getSurah(num);
      if (!surah) {
        document.getElementById('qr-reader-inner').innerHTML =
          '<div style="text-align:center; padding:40px; color: var(--text-secondary);">Surah not found.</div>';
        return;
      }
      const trans = await getTranslationForSurah(state.translation, num);
      const transByN = {};
      if (trans) for (const v of trans) transByN[v.n] = v.text;

      const inner = document.getElementById('qr-reader-inner');
      inner.className = (state.translation === 'none') ? 'qr-hidden-translation' : '';

      const showBismillah = num !== 1 && num !== 9;
      const badge = surah.type === 'meccan' ? 'Meccan' : 'Medinan';

      let html = '';
      html += `<div class="qr-surah-head">`;
      html += `  <div class="qr-surah-arabic">${escapeHtml(surah.arabic)}</div>`;
      html += `  <div class="qr-surah-translit">${escapeHtml(surah.transliteration)}</div>`;
      if (surah.meaning) {
        html += `  <div class="qr-surah-meaning">${escapeHtml(surah.meaning)}</div>`;
      }
      html += `  <div class="qr-surah-meta">`;
      html += `    <span class="qr-badge">${badge}</span>`;
      html += `    Surah ${surah.number} · ${surah.verseCount} verses`;
      html += `  </div>`;
      html += `</div>`;

      if (showBismillah) {
        html += `<div class="qr-bismillah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>`;
      }

      for (const v of surah.verses) {
        const ref = `${num}:${v.n}`;
        const isBookmarked = state.duaSet.has(ref);
        const transText = transByN[v.n] || '';
        html += `<div class="qr-verse" id="v-${v.n}" data-surah="${num}" data-verse="${v.n}">`;
        html += `  <div class="qr-verse-arabic-row">`;
        html += `    <div class="qr-verse-badge">${arabicNumeral(v.n)}</div>`;
        html += `    <div class="qr-verse-arabic">${escapeHtml(v.arabic)}</div>`;
        html += `  </div>`;
        if (transText) {
          html += `  <div class="qr-verse-translation">${escapeHtml(transText)}</div>`;
        }
        html += `  <div class="qr-verse-ref">${surah.transliteration} · ${ref}</div>`;
        html += `  <div class="qr-verse-actions">`;
        html += `    <button class="qr-verse-action" data-act="copy">Copy</button>`;
        html += `    <button class="qr-verse-action" data-act="share">Share</button>`;
        html += `    <button class="qr-verse-action ${isBookmarked ? 'qr-bookmarked' : ''}" data-act="dua">`;
        html += `      ★ ${isBookmarked ? 'Saved' : 'Bookmark as Dua'}`;
        html += `    </button>`;
        html += `    <button class="qr-verse-action" data-act="audio" disabled title="Audio coming in v2">▶ Audio</button>`;
        html += `  </div>`;
        html += `</div>`;
      }

      // Footer navigation
      const prevDisabled = num <= 1;
      const nextDisabled = num >= 114;
      const prevLabel = num > 1 ? state.surahs[num - 2].transliteration : '';
      const nextLabel = num < 114 ? state.surahs[num].transliteration : '';
      html += `<div class="qr-footer-nav">`;
      html += `  <button id="qr-prev" ${prevDisabled ? 'disabled' : ''}>← ${escapeHtml(prevLabel) || 'Previous'}</button>`;
      html += `  <button id="qr-next" ${nextDisabled ? 'disabled' : ''}>${escapeHtml(nextLabel) || 'Next'} →</button>`;
      html += `</div>`;

      inner.innerHTML = html;

      // Wire prev/next
      const prev = document.getElementById('qr-prev');
      const next = document.getElementById('qr-next');
      if (prev && !prevDisabled) prev.addEventListener('click', () => navigateTo(num - 1, null));
      if (next && !nextDisabled) next.addEventListener('click', () => navigateTo(num + 1, null));

      // Event delegation for verse actions
      inner.addEventListener('click', onVerseAction);

      if (scrollToVerse && Number.isFinite(Number(scrollToVerse))) {
        const el = document.getElementById(`v-${scrollToVerse}`);
        if (el) el.scrollIntoView({ behavior: 'auto', block: 'center' });
      } else {
        document.getElementById('qr-reader').scrollTop = 0;
      }
    }

    function arabicNumeral(n) {
      const digits = '٠١٢٣٤٥٦٧٨٩';
      return String(n).replace(/\d/g, (d) => digits[d]);
    }

    async function onVerseAction(e) {
      const btn = e.target.closest('.qr-verse-action');
      if (!btn) return;
      const verseEl = btn.closest('.qr-verse');
      if (!verseEl) return;
      const s = Number(verseEl.getAttribute('data-surah'));
      const v = Number(verseEl.getAttribute('data-verse'));
      const act = btn.getAttribute('data-act');
      if (act === 'audio') return; // placeholder

      const verseData = await api.quran.getVerse(s, v);
      if (!verseData) return;
      const ref = `${s}:${v}`;
      const tText = state.translation === 'pickthall'
        ? verseData.pickthall : verseData.sahih;

      if (act === 'copy' || act === 'share') {
        const lines = [
          verseData.arabic,
          tText ? '' : null,
          tText || null,
          '',
          `— Quran ${ref} (${verseData.surahName})`
        ].filter((x) => x !== null).join('\n');
        try {
          await navigator.clipboard.writeText(lines);
          showToast(act === 'share' ? 'Copied to clipboard — ready to share' : 'Copied');
        } catch (_) {
          showToast('Clipboard unavailable');
        }
        return;
      }

      if (act === 'dua') {
        if (state.duaSet.has(ref)) {
          showToast('Already saved to Duas');
          return;
        }
        const entry = {
          type:             'ayah',
          reference:        `Quran ${ref}`,
          text_arabic:      verseData.arabic,
          text_translation: tText || '',
          translation_lang: state.translation === 'pickthall' ? 'en-pickthall' : 'en-sahih',
          notes:            ''
        };
        await api.duas.add(entry);
        state.duaSet.add(`Quran ${ref}`);
        // Also track un-prefixed to be defensive.
        state.duaSet.add(ref);
        btn.classList.add('qr-bookmarked');
        btn.innerHTML = '★ Saved';
        showToast('Saved to Duas');
        return;
      }
    }

    function navigateTo(num, verseNumber) {
      num = Math.max(1, Math.min(114, Number(num) || 1));
      state.currentSurah = num;
      state.currentVerse = verseNumber;
      document.getElementById('qr-surah-picker').value = String(num);
      document.querySelectorAll('.qr-sidebar-item[data-active="true"]')
        .forEach((el) => el.removeAttribute('data-active'));
      const idx = num - 1;
      const sidebarItems = document.querySelectorAll('.qr-sidebar-item');
      if (sidebarItems[idx]) sidebarItems[idx].setAttribute('data-active', 'true');
      return renderSurah(num, verseNumber);
    }

    // Ayah jump input: accepts "S:V" or "S"
    document.getElementById('qr-jump').addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const v = e.target.value.trim();
      if (!v) return;
      const m = v.match(/^(\d{1,3})(?::(\d{1,3}))?$/);
      if (!m) { showToast('Format: 2:255 or 2'); return; }
      const s = Number(m[1]);
      const ay = m[2] ? Number(m[2]) : null;
      if (s < 1 || s > 114) { showToast('Surah must be 1-114'); return; }
      navigateTo(s, ay);
      e.target.value = '';
    });

    document.getElementById('qr-surah-picker').addEventListener('change', (e) => {
      navigateTo(Number(e.target.value), null);
    });

    document.getElementById('qr-translation').addEventListener('change', async (e) => {
      state.translation = e.target.value;
      try {
        if (api.settings && api.settings.update) {
          await api.settings.update('features.worship.quranTranslation', state.translation);
        }
      } catch (_) {}
      // Re-render current surah with new translation.
      await renderSurah(state.currentSurah, state.currentVerse);
    });

    document.getElementById('qr-toggle-sidebar').addEventListener('click', () => {
      const layout = document.getElementById('qr-layout');
      const mode = layout.getAttribute('data-sidebar') === 'hidden' ? 'visible' : 'hidden';
      layout.setAttribute('data-sidebar', mode);
    });

    // ——— Search ———
    let searchTimer = null;
    const searchInput = document.getElementById('qr-search');
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => runSearch(searchInput.value), 220);
    });

    async function runSearch(qRaw) {
      const q = String(qRaw || '').trim().toLowerCase();
      const inner = document.getElementById('qr-reader-inner');
      let results = inner.querySelector('.qr-search-results');
      if (!results) {
        results = document.createElement('div');
        results.className = 'qr-search-results';
        inner.insertBefore(results, inner.firstChild);
      }
      if (q.length < 3) { results.setAttribute('data-open', 'false'); results.innerHTML = ''; return; }

      const lang = state.translation === 'pickthall' ? 'pickthall' : 'sahih';
      const hits = [];
      // Load translation for all surahs on first search. This is ~950 KB —
      // already in the main process cache, the IPC round-trip is the only cost.
      for (let n = 1; n <= 114 && hits.length < 300; n++) {
        const t = await getTranslationForSurah(lang, n);
        if (!t) continue;
        for (const v of t) {
          if (v.text && v.text.toLowerCase().includes(q)) {
            hits.push({ s: n, v: v.n, text: v.text });
            if (hits.length >= 300) break;
          }
        }
      }

      let html = `<div class="qr-search-count">Found ${hits.length} verse${hits.length === 1 ? '' : 's'}${hits.length >= 300 ? ' (showing first 300)' : ''}</div>`;
      const rx = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
      for (const h of hits.slice(0, 50)) {
        const surahName = (state.surahs[h.s - 1] || {}).transliteration || `Surah ${h.s}`;
        const highlighted = escapeHtml(h.text).replace(rx, '<mark>$1</mark>');
        html += `<div class="qr-search-hit" data-s="${h.s}" data-v="${h.v}">`;
        html += `  <div class="hit-ref">${surahName} · ${h.s}:${h.v}</div>`;
        html += `  <div class="hit-text">${highlighted}</div>`;
        html += `</div>`;
      }
      results.innerHTML = html;
      results.setAttribute('data-open', 'true');
      results.querySelectorAll('.qr-search-hit').forEach((el) => {
        el.addEventListener('click', () => {
          navigateTo(Number(el.getAttribute('data-s')), Number(el.getAttribute('data-v')));
          searchInput.value = '';
          results.setAttribute('data-open', 'false');
          results.innerHTML = '';
        });
      });
    }

    // ——— Keyboard nav ———
    document.addEventListener('keydown', (e) => {
      if (e.target && /INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;
      if (e.key === 'ArrowLeft')  { navigateToPrev(); e.preventDefault(); }
      if (e.key === 'ArrowRight') { navigateToNext(); e.preventDefault(); }
    });
    function navigateToPrev() { if (state.currentSurah > 1) navigateTo(state.currentSurah - 1, null); }
    function navigateToNext() { if (state.currentSurah < 114) navigateTo(state.currentSurah + 1, null); }

    // ——— Boot ———
    (async function boot() {
      try {
        const [surahs] = await Promise.all([api.quran.getSurahList(), loadDuaSet()]);
        state.surahs = surahs || [];

        // Parse initial query: ?s=2 or ?s=2&v=255
        const q = (window.__NOORANI_DATA__ && window.__NOORANI_DATA__.query) || {};
        const initS = Number(q.s);
        const initV = Number(q.v);
        if (Number.isFinite(initS) && initS >= 1 && initS <= 114) {
          state.currentSurah = initS;
          if (Number.isFinite(initV) && initV > 0) state.currentVerse = initV;
        }

        populateSurahPicker();
        document.getElementById('qr-translation').value = state.translation;
        renderSidebar();
        await renderSurah(state.currentSurah, state.currentVerse);
      } catch (err) {
        console.error('[quran] boot failed:', err);
        document.getElementById('qr-reader-inner').innerHTML =
          '<div style="text-align:center; padding:40px; color: var(--text-secondary);">Failed to load Quran data: ' + escapeHtml(err.message || String(err)) + '</div>';
      }
    })();
  </script>
</body>
</html>
