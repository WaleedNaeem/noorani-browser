<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    CSP applies to the UI chrome (this page) only.
    The <webview> element is a guest process with its own origin and CSP,
    so letting it load arbitrary sites is controlled by the webview itself,
    not by this document's CSP. We still keep the chrome locked down.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; child-src *; frame-src *;">
  <title>Noorani Browser</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --toolbar: #252525;
      --text: #e0e0e0;
      --muted: #8a8a8a;
      --accent: #d4af37;
      --border: #333333;
      --hover: #303030;
      --input-bg: #1a1a1a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Top toolbar (48px) */
    .toolbar {
      flex: 0 0 48px;
      height: 48px;
      background: var(--toolbar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
      user-select: none;
    }

    .btn {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 120ms ease, color 120ms ease;
    }
    .btn:hover:not(:disabled) { background: var(--hover); }
    .btn:active:not(:disabled) { background: #3a3a3a; }
    .btn:disabled { color: var(--muted); opacity: 0.4; cursor: default; }
    .btn svg { width: 18px; height: 18px; display: block; }

    /* URL bar takes remaining space */
    .url-wrap {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      margin: 0 4px;
    }
    #url {
      flex: 1 1 auto;
      height: 36px;
      padding: 0 12px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    #url::placeholder { color: var(--muted); }
    #url:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    /* Webview fills remaining space */
    webview {
      flex: 1 1 auto;
      width: 100%;
      background: #ffffff;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="toolbar" role="toolbar" aria-label="Browser navigation">
    <button class="btn" id="back" title="Back (Alt+Left)" aria-label="Back" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>

    <button class="btn" id="forward" title="Forward (Alt+Right)" aria-label="Forward" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>

    <button class="btn" id="reload" title="Reload (Ctrl+R)" aria-label="Reload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>

    <div class="url-wrap">
      <input id="url" type="text" spellcheck="false" autocomplete="off"
             placeholder="Search Google or enter a URL" />
    </div>
  </div>

  <webview id="view"
           src="https://www.google.com"
           allowpopups></webview>

  <script src="renderer.js"></script>
</body>
</html>
