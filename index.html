<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <script>
    // Apply saved theme before styles render, so we don't flash.
    (function () {
      try {
        const saved = localStorage.getItem('noorani-effective-theme');
        document.documentElement.setAttribute(
          'data-theme',
          saved === 'dark' ? 'dark' : 'light'
        );
      } catch (_) {}
    })();
  </script>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data: https: http:;
                 media-src 'self' noorani:;
                 child-src *; frame-src *;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/typography.css">
  <title>Noorani Browser</title>
  <style>
    /* =========================================================
       THEME PALETTES
       ========================================================= */
    :root[data-theme="light"] {
      --bg-primary:       #faf7f2;
      --bg-toolbar:       #ffffff;
      --bg-tab-inactive:  #f0ece5;
      --bg-tab-active:    #ffffff;
      --text-primary:     #2a2a2a;
      --text-secondary:   #6b6b6b;
      --accent-gold:      #c9a961;
      --border:           #e8e2d5;

      --hover:            rgba(0,0,0,0.05);
      --active:           rgba(0,0,0,0.1);
      --panel-bg:         #ffffff;
      --panel-hover:      #f5f0e5;
      --panel-border:     #e8e2d5;
      --input-bg:         #ffffff;
      --tab-hover:        #e8e2d5;
      --tab-bar-bg:       #ffffff;
      --webview-bg:       #ffffff;
      --scrollbar-thumb:  #cfc4a8;
    }

    :root[data-theme="dark"] {
      --bg-primary:       #1a1a1a;
      --bg-toolbar:       #252525;
      --bg-tab-inactive:  #2a2a2a;
      --bg-tab-active:    #333333;
      --text-primary:     #e8e8e8;
      --text-secondary:   #9a9a9a;
      --accent-gold:      #d4af37;
      --border:           #3a3a3a;

      --hover:            #303030;
      --active:           #3a3a3a;
      --panel-bg:         #1f1f1f;
      --panel-hover:      #2a2a2a;
      --panel-border:     #2f2f2f;
      --input-bg:         #1a1a1a;
      --tab-hover:        #2d2d2d;
      --tab-bar-bg:       #252525;
      --webview-bg:       #1a1a1a;
      --scrollbar-thumb:  #3a3a3a;
    }

    /* Backwards-compatible aliases used throughout the Phase 1–4 CSS. */
    :root {
      --bg:           var(--bg-primary);
      --toolbar:      var(--bg-toolbar);
      --tab-inactive: var(--bg-tab-inactive);
      --tab-active:   var(--bg-tab-active);
      --text:         var(--text-primary);
      --muted:        var(--text-secondary);
      --accent:       var(--accent-gold);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* ============ TAB BAR ============ */
    /* Tab bar and toolbar share a background so there's no visible seam
       between them; the bottom border on the toolbar is what separates
       chrome from content area. */
    .tab-bar {
      flex: 0 0 38px;
      height: 38px;
      background: var(--tab-bar-bg);
      display: flex; align-items: flex-end;
      user-select: none;
      padding: 0 4px;
    }
    .tabs {
      flex: 1 1 auto;
      display: flex; align-items: flex-end;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none; -ms-overflow-style: none;
      gap: 2px;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 200px;
      max-width: 200px; min-width: 100px;
      height: 34px;
      background: var(--tab-inactive);
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      display: flex; align-items: center;
      padding: 0 6px 0 12px; gap: 8px;
      cursor: default; position: relative; overflow: hidden;
      color: var(--muted);
      animation: tab-in 180ms ease-out;
      transition: background-color 150ms ease, color 150ms ease,
                  max-width 150ms ease-out, min-width 150ms ease-out,
                  padding 150ms ease-out, opacity 150ms ease-out;
    }
    /* Width sweeps from 0 to the final flex basis — the rest of the row
       reflows naturally. */
    @keyframes tab-in {
      from { opacity: 0; max-width: 0;     min-width: 0;     padding-left: 0;    padding-right: 0; }
      to   { opacity: 1; max-width: 200px; min-width: 100px; padding-left: 12px; padding-right: 6px; }
    }
    /* Close collapses the same dimensions back to 0, then the node is
       removed from the DOM by the renderer. */
    .tab.is-leaving {
      opacity: 0;
      max-width: 0; min-width: 0;
      padding-left: 0; padding-right: 0;
      pointer-events: none;
    }
    .tab:hover { background: var(--tab-hover); color: var(--text); }
    .tab.active {
      background: var(--tab-active);
      color: var(--text);
    }
    .tab.active::before {
      content: ''; position: absolute;
      top: 0; left: 8px; right: 8px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
    .tab__favicon {
      width: 16px; height: 16px; flex: 0 0 16px;
      object-fit: contain; border-radius: 2px;
    }
    .tab__title {
      flex: 1 1 auto; font-family: var(--font-sans);
      font-size: var(--text-xs); font-weight: 500; line-height: 34px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: inherit;
    }
    .tab__close {
      flex: 0 0 20px; width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 4px;
      color: var(--muted); cursor: pointer; padding: 0;
      opacity: 0;
      transition: opacity 120ms ease, background-color 120ms ease,
                  color 120ms ease;
    }
    .tab__close:hover { background: var(--active); color: var(--text); }
    .tab:hover .tab__close,
    .tab.active .tab__close { opacity: 1; }
    .tab.loading .tab__favicon { opacity: 0.55; }

    .new-tab-btn {
      flex: 0 0 32px; width: 32px; height: 32px;
      margin: 0 4px 2px 6px;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
      border-radius: 6px;
      transition: background-color 150ms ease, color 150ms ease;
    }
    .new-tab-btn:hover { background: var(--tab-hover); color: var(--accent); }

    /* ============ TOOLBAR ============ */
    .toolbar {
      flex: 0 0 48px; height: 48px;
      background: var(--toolbar);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 8px; gap: 4px;
      user-select: none;
    }

    .btn {
      width: 36px; height: 36px;
      display: inline-flex;
      align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--text);
      border-radius: 6px; cursor: pointer; position: relative;
      transition: background-color 120ms ease, color 120ms ease;
    }
    .btn:hover:not(:disabled) { background: var(--hover); }
    .btn:active:not(:disabled) { background: var(--active); }
    .btn:disabled { color: var(--muted); opacity: 0.4; cursor: default; }
    .btn svg { width: 18px; height: 18px; display: block; }

    .btn.active-star { color: var(--accent); }
    .btn.active-star svg { fill: var(--accent); stroke: var(--accent); }

    .btn.panel-open { background: var(--hover); color: var(--accent); }

    .dl-badge {
      position: absolute;
      top: 4px; right: 4px;
      min-width: 14px; height: 14px;
      padding: 0 3px;
      background: var(--accent);
      color: var(--bg-primary);
      border-radius: 8px;
      font-size: 9px; font-weight: 700; line-height: 14px;
      text-align: center; pointer-events: none;
    }
    .dl-badge[hidden] { display: none; }

    .url-wrap {
      flex: 1 1 auto; display: flex; align-items: center; margin: 0 4px;
    }
    #url {
      flex: 1 1 auto; height: 36px; padding: 0 14px;
      background: var(--input-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color 200ms ease-out, box-shadow 200ms ease-out;
    }
    #url::placeholder { color: var(--muted); }
    #url:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.2);
    }

    .tb-divider {
      width: 1px; height: 22px;
      background: var(--border);
      margin: 0 2px;
      flex: 0 0 1px;
    }

    /* Phase 9 Batch 1 — Prayer pill in the toolbar */
    :root[data-theme="light"] {
      --prayer-pill-bg:   #f5eccf;
      --prayer-pill-ink:  #8a6f2b;
      --prayer-pill-hi:   #e8dbb3;
    }
    :root[data-theme="dark"] {
      --prayer-pill-bg:   rgba(212, 175, 55, 0.14);
      --prayer-pill-ink:  #d4af37;
      --prayer-pill-hi:   rgba(212, 175, 55, 0.24);
    }
    .prayer-pill-wrap { position: relative; margin: 0 4px; }
    .prayer-pill {
      display: inline-flex; align-items: center;
      height: 28px; padding: 0 12px;
      gap: 6px;
      background: var(--prayer-pill-bg);
      color: var(--prayer-pill-ink);
      border: 1px solid transparent;
      border-radius: 999px;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 140ms ease;
    }
    .prayer-pill:hover { background: var(--prayer-pill-hi); }
    .prayer-pill[hidden] { display: none !important; }
    .prayer-pill__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--prayer-pill-ink);
      opacity: 0.7;
    }
    .prayer-pop {
      position: absolute;
      top: calc(100% + 6px); right: 0;
      min-width: 220px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 10px 6px;
      z-index: 500;
    }
    .prayer-pop[hidden] { display: none; }
    .prayer-pop__row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 12px;
      font-size: var(--text-sm);
      color: var(--text);
      border-radius: 6px;
    }
    .prayer-pop__row--active {
      background: var(--prayer-pill-bg);
      color: var(--prayer-pill-ink);
      font-weight: 600;
    }
    .prayer-pop__row--passed { color: var(--muted); }
    .prayer-pop__name { text-transform: capitalize; }
    .prayer-pop__time { font-variant-numeric: tabular-nums; }
    .prayer-pop__divider {
      border-top: 1px solid var(--border);
      margin: 6px 10px;
    }
    .prayer-pop__meta {
      padding: 6px 12px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ============ CONTENT AREA ============ */
    .content {
      flex: 1 1 auto;
      position: relative;
      background: var(--webview-bg);
      overflow: hidden;
    }
    .content webview {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0; background: var(--webview-bg);
      z-index: 1;
      opacity: 1;
      transition: opacity 120ms ease-out;
    }
    .content webview.hidden { display: none !important; }
    /* Briefly set by the renderer on the newly-active webview so it fades
       in instead of snapping. The outgoing webview just goes display:none
       (no fade) to avoid overlap. */
    .content webview.is-entering { opacity: 0; }

    /* Horizontal loading progress bar — sits just under the toolbar. */
    .loading-bar {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
    }
    .loading-bar.is-loading {
      opacity: 1;
      width: 88%;
      transition: width 6s cubic-bezier(0.1, 0.6, 0.05, 0.98);
    }
    .loading-bar.is-done {
      width: 100% !important;
      opacity: 0;
      transition: width 180ms ease-out, opacity 260ms ease 160ms;
    }

    /* ============ PANEL ============ */
    .panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 360px;
      background: var(--panel-bg);
      border-left: 1px solid var(--panel-border);
      color: var(--text);
      display: flex; flex-direction: column;
      z-index: 10;
      box-shadow: -8px 0 24px rgba(0,0,0,0.2);
      animation: panel-slide-in 200ms ease-out;
    }
    .panel[hidden] { display: none; }
    @keyframes panel-slide-in {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .panel__header {
      flex: 0 0 44px;
      display: flex; align-items: center;
      padding: 0 8px 0 14px;
      border-bottom: 1px solid var(--panel-border);
      gap: 8px;
    }
    .panel__title {
      flex: 1; margin: 0;
      font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
    }
    .panel__clear {
      font-size: 11px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .panel__clear:hover { color: var(--text); border-color: var(--accent); }
    .panel__close {
      width: 28px; height: 28px;
      background: transparent; border: none;
      color: var(--text); border-radius: 4px;
      cursor: pointer; font-size: 18px; line-height: 1;
    }
    .panel__close:hover { background: var(--panel-hover); }

    .panel__body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 6px 0;
    }
    .panel__body::-webkit-scrollbar { width: 8px; }
    .panel__body::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb); border-radius: 4px;
    }

    .panel__section { display: none; padding: 0; }
    .panel__section.active { display: block; }

    .panel__section-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 12px 16px 6px;
    }

    .panel__empty {
      padding: 52px 24px;
      color: var(--muted);
      font-size: var(--text-sm);
      text-align: center;
      line-height: var(--leading-body);
    }
    .panel__empty__icon {
      display: block;
      width: 32px; height: 32px;
      margin: 0 auto 14px;
      color: var(--muted);
      opacity: 0.55;
    }

    .panel__search {
      margin: 8px 12px 4px;
      height: 32px;
      width: calc(100% - 24px);
      padding: 0 10px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px; outline: none;
    }
    .panel__search:focus { border-color: var(--accent); }

    .entry {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      border: none; background: transparent;
      color: var(--text);
      width: 100%; text-align: left;
    }
    .entry:hover { background: var(--panel-hover); }
    .entry__favicon {
      width: 16px; height: 16px; flex: 0 0 16px;
      object-fit: contain; border-radius: 2px;
    }
    .entry__text { flex: 1 1 auto; overflow: hidden; min-width: 0; }
    .entry__title {
      font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry__url {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry__remove, .entry__action {
      flex: 0 0 auto;
      width: 24px; height: 24px;
      background: transparent; border: none;
      color: var(--muted); border-radius: 3px;
      cursor: pointer; font-size: 14px;
      display: none;
      align-items: center; justify-content: center;
    }
    .entry:hover .entry__remove,
    .entry:hover .entry__action { display: inline-flex; }
    .entry__remove:hover, .entry__action:hover {
      background: var(--active); color: var(--text);
    }
    .entry__action {
      width: auto; padding: 0 8px;
      font-size: 11px;
      display: inline-flex !important;
      color: var(--text);
      border: 1px solid var(--border);
      margin-left: 4px;
    }
    .entry__action:hover { border-color: var(--accent); }

    .download-entry .progress {
      margin-top: 4px; height: 3px;
      background: var(--bg-tab-inactive);
      border-radius: 2px; overflow: hidden;
    }
    .download-entry .progress__bar {
      height: 100%; background: var(--accent);
      transition: width 180ms ease;
    }

    /* ============ BOOKMARK BAR ============ */
    /* Sits directly under the toolbar. Animates from 36px → 0 when the
       user disables it (or navigates away under new-tab-only mode). */
    .bookmark-bar {
      flex: 0 0 36px;
      height: 36px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 8px 0 12px;
      gap: 4px;
      overflow: hidden;
      user-select: none;
      transition: height 200ms ease-out, flex-basis 200ms ease-out,
                  opacity 160ms ease-out, border-width 200ms ease-out;
    }
    .bookmark-bar.is-hidden {
      flex-basis: 0;
      height: 0;
      opacity: 0;
      border-bottom-width: 0;
      pointer-events: none;
    }

    .bookmark-bar__items {
      flex: 1 1 auto;
      display: flex; align-items: center;
      gap: 2px;
      overflow: hidden;
      min-width: 0;
    }

    .bookmark-item {
      flex: 0 0 auto;
      height: 28px;
      display: inline-flex; align-items: center;
      gap: 6px;
      padding: 0 8px;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 500;
      max-width: 200px;
      transition: background-color 120ms ease, opacity 150ms ease-out;
    }
    .bookmark-item:hover       { background: var(--bg-tab-inactive); }
    .bookmark-item.is-entering { opacity: 0; }
    .bookmark-item.is-leaving  { opacity: 0; }
    .bookmark-item__fav {
      width: 16px; height: 16px; flex: 0 0 16px;
      object-fit: contain; border-radius: 2px;
    }
    .bookmark-item__title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 150px;
    }

    .bookmark-bar__empty {
      flex: 1 1 auto;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-style: italic;
      color: var(--muted);
      text-align: center;
      padding: 0 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-bar__overflow {
      flex: 0 0 28px;
      width: 28px; height: 28px;
      display: none;
      align-items: center; justify-content: center;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      transition: background-color 120ms ease, color 120ms ease;
    }
    .bookmark-bar__overflow:hover {
      background: var(--bg-tab-inactive);
      color: var(--text);
    }
    .bookmark-bar__overflow.is-visible { display: inline-flex; }

    /* Floating overflow dropdown + context menu share this shell. */
    .bookmark-menu {
      position: fixed;
      z-index: 1000;
      min-width: 180px;
      max-width: 280px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      padding: 4px;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 120ms ease-out, transform 120ms ease-out;
    }
    .bookmark-menu.is-open { opacity: 1; transform: translateY(0); }
    .bookmark-menu__item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--text);
      width: 100%;
      text-align: left;
      cursor: pointer;
      font: inherit;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .bookmark-menu__item:hover { background: var(--panel-hover); }
    .bookmark-menu__item.is-danger { color: #c0392b; }
    .bookmark-menu__item.is-danger:hover { background: rgba(192, 57, 43, 0.08); }
    .bookmark-menu__item--fav {
      width: 14px; height: 14px; flex: 0 0 14px;
      object-fit: contain; border-radius: 2px;
    }
    .bookmark-menu__sep {
      height: 1px;
      margin: 4px 2px;
      background: var(--panel-border);
    }
  </style>
</head>
<body>
  <!-- Tab bar -->
  <div class="tab-bar" role="tablist" aria-label="Browser tabs">
    <div class="tabs" id="tabs">
      <button class="new-tab-btn" id="new-tab" title="New tab (Ctrl+T)" aria-label="New tab">+</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" role="toolbar" aria-label="Browser navigation">
    <button class="btn" id="back" title="Back (Alt+Left)" aria-label="Back" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <button class="btn" id="forward" title="Forward (Alt+Right)" aria-label="Forward" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
    <button class="btn" id="reload" title="Reload (Ctrl+R)" aria-label="Reload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>
    <button class="btn" id="home-btn" title="Home (Alt+Home)" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l9-9 9 9"></path>
        <path d="M5 10v10h14V10"></path>
      </svg>
    </button>

    <div class="url-wrap">
      <input id="url" type="text" spellcheck="false" autocomplete="off"
             placeholder="Search or enter a URL" />
    </div>

    <button class="btn" id="star-btn" title="Bookmark this page" aria-label="Bookmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
    </button>
    <div class="tb-divider"></div>
    <button class="btn" id="bookmarks-btn" title="Bookmarks" aria-label="Bookmarks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
    <button class="btn" id="history-btn" title="History" aria-label="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        <polyline points="12 7 12 12 15 14"></polyline>
      </svg>
    </button>
    <button class="btn" id="downloads-btn" title="Downloads" aria-label="Downloads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span class="dl-badge" id="dl-badge" hidden>0</span>
    </button>
    <div class="prayer-pill-wrap">
      <button class="prayer-pill" id="prayer-pill" type="button" hidden
              aria-label="Next prayer" title="Next prayer">
        <span class="prayer-pill__dot"></span>
        <span id="prayer-pill-text">—</span>
      </button>
      <div class="prayer-pop" id="prayer-pop" hidden></div>
    </div>
    <button class="btn" id="settings-btn" title="Settings (Ctrl+,)" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <!-- Bookmark bar. Starts in the hidden collapsed state so there's
       no flash before the renderer reads the user's setting and, if
       needed, reveals it. -->
  <div class="bookmark-bar is-hidden" id="bookmark-bar" style="visibility: hidden;">
    <div class="bookmark-bar__items" id="bookmark-bar-items"></div>
    <button class="bookmark-bar__overflow" id="bookmark-bar-overflow"
            type="button" title="More bookmarks" aria-label="More bookmarks">&raquo;</button>
  </div>

  <!-- Content area -->
  <div class="content" id="content">
    <div class="loading-bar" id="loading-bar"></div>
    <aside class="panel" id="panel" hidden>
      <header class="panel__header">
        <h2 class="panel__title" id="panel-title">Bookmarks</h2>
        <button class="panel__clear" id="panel-clear" hidden>Clear history</button>
        <button class="panel__close" id="panel-close" aria-label="Close panel">&times;</button>
      </header>
      <div class="panel__body">
        <section class="panel__section" data-panel="bookmarks" id="section-bookmarks">
          <div id="bookmarks-list"></div>
        </section>
        <section class="panel__section" data-panel="history" id="section-history">
          <input class="panel__search" id="history-search" type="text"
                 placeholder="Search history" autocomplete="off" spellcheck="false" />
          <div id="history-list"></div>
        </section>
        <section class="panel__section" data-panel="downloads" id="section-downloads">
          <div id="downloads-list"></div>
        </section>
      </div>
    </aside>
  </div>

  <script src="modal.js"></script>
  <script src="contextmenu.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
